<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">TechPulse Architecture</title>
  <desc id="desc">Architecture diagram for the TechPulse AI digest system, showing data sources, FastAPI backend agents, checkpoints, AI providers, storage, observability, frontend, and publishing outputs.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f4; }
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #10251f; }
      .subtitle { font: 400 20px Inter, Arial, sans-serif; fill: #52625c; }
      .section-title { font: 700 18px Inter, Arial, sans-serif; fill: #173f33; }
      .box-title { font: 700 17px Inter, Arial, sans-serif; fill: #13231e; }
      .box-text { font: 400 14px Inter, Arial, sans-serif; fill: #5a6863; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #61706b; }
      .panel { fill: #ffffff; stroke: #d8e0dc; stroke-width: 2; rx: 18; }
      .source { fill: #eef6f2; stroke: #9cc5b5; stroke-width: 2; rx: 14; }
      .agent { fill: #ffffff; stroke: #aebbb6; stroke-width: 2; rx: 14; }
      .checkpoint { fill: #fff5cf; stroke: #d0a72d; stroke-width: 2; rx: 14; }
      .ai { fill: #edf3ff; stroke: #91aee3; stroke-width: 2; rx: 14; }
      .storage { fill: #f1eefb; stroke: #ad9ddd; stroke-width: 2; rx: 14; }
      .output { fill: #eaf7f5; stroke: #6bb9ad; stroke-width: 2; rx: 14; }
      .ui { fill: #f8eeee; stroke: #d99a9a; stroke-width: 2; rx: 14; }
      .arrow { stroke: #47645b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .soft-arrow { stroke: #8a9a94; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowhead-soft); }
      .lane-label { font: 700 13px Inter, Arial, sans-serif; fill: #ffffff; }
      .lane { fill: #176b51; rx: 12; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#47645b"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8a9a94"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <text class="title" x="80" y="82">TechPulse Architecture</text>
  <text class="subtitle" x="80" y="118">Human-approved multi-agent tech digest pipeline</text>

  <rect class="panel" x="60" y="170" width="250" height="520"/>
  <text class="section-title" x="90" y="210">Data Sources</text>
  <rect class="source" x="90" y="245" width="190" height="70"/>
  <text class="box-title" x="118" y="275">GitHub</text>
  <text class="box-text" x="118" y="298">Trending repos</text>
  <rect class="source" x="90" y="335" width="190" height="70"/>
  <text class="box-title" x="118" y="365">Hacker News</text>
  <text class="box-text" x="118" y="388">Community signals</text>
  <rect class="source" x="90" y="425" width="190" height="70"/>
  <text class="box-title" x="118" y="455">Dev Blogs</text>
  <text class="box-text" x="118" y="478">Engineering posts</text>
  <rect class="source" x="90" y="515" width="190" height="70"/>
  <text class="box-title" x="118" y="545">arXiv / Papers</text>
  <text class="box-text" x="118" y="568">Research updates</text>

  <rect class="panel" x="370" y="150" width="850" height="590"/>
  <text class="section-title" x="405" y="190">FastAPI Backend + Agent Pipeline</text>

  <rect class="lane" x="405" y="220" width="180" height="30"/>
  <text class="lane-label" x="438" y="241">Discovery</text>
  <rect class="agent" x="405" y="275" width="160" height="78"/>
  <text class="box-title" x="444" y="307">Fetcher</text>
  <text class="box-text" x="429" y="330">Pull raw items</text>
  <rect class="agent" x="405" y="380" width="160" height="78"/>
  <text class="box-title" x="453" y="412">Dedup</text>
  <text class="box-text" x="427" y="435">Remove repeats</text>
  <rect class="agent" x="405" y="485" width="160" height="78"/>
  <text class="box-title" x="432" y="517">Topic Filter</text>
  <text class="box-text" x="430" y="540">Score relevance</text>
  <rect class="checkpoint" x="390" y="595" width="190" height="92"/>
  <text class="box-title" x="430" y="628">Checkpoint 1</text>
  <text class="box-text" x="426" y="653">Approve filtered</text>
  <text class="box-text" x="458" y="673">items</text>

  <rect class="lane" x="660" y="220" width="180" height="30"/>
  <text class="lane-label" x="704" y="241">Analysis</text>
  <rect class="agent" x="670" y="275" width="160" height="78"/>
  <text class="box-title" x="707" y="307">Summariser</text>
  <text class="box-text" x="701" y="330">TL;DR per item</text>
  <rect class="agent" x="670" y="380" width="160" height="78"/>
  <text class="box-title" x="709" y="412">Classifier</text>
  <text class="box-text" x="692" y="435">Category + tags</text>
  <rect class="agent" x="670" y="485" width="160" height="78"/>
  <text class="box-title" x="703" y="517">Novelty Score</text>
  <text class="box-text" x="698" y="540">Compare history</text>
  <rect class="checkpoint" x="655" y="595" width="190" height="92"/>
  <text class="box-title" x="695" y="628">Checkpoint 2</text>
  <text class="box-text" x="697" y="653">Approve ranked</text>
  <text class="box-text" x="724" y="673">items</text>

  <rect class="lane" x="925" y="220" width="180" height="30"/>
  <text class="lane-label" x="972" y="241">Digest</text>
  <rect class="agent" x="935" y="275" width="160" height="78"/>
  <text class="box-title" x="984" y="307">Writer</text>
  <text class="box-text" x="965" y="330">Draft digest</text>
  <rect class="agent" x="935" y="380" width="160" height="78"/>
  <text class="box-title" x="974" y="412">Formatter</text>
  <text class="box-text" x="956" y="435">Markdown + HTML</text>
  <rect class="checkpoint" x="920" y="485" width="190" height="92"/>
  <text class="box-title" x="960" y="518">Checkpoint 3</text>
  <text class="box-text" x="962" y="543">Approve final</text>
  <text class="box-text" x="981" y="563">copy</text>
  <rect class="agent" x="935" y="610" width="160" height="78"/>
  <text class="box-title" x="974" y="642">Publisher</text>
  <text class="box-text" x="963" y="665">Send + archive</text>

  <path class="arrow" d="M280 280 C330 280 345 314 405 314"/>
  <path class="arrow" d="M280 370 C330 370 345 314 405 314"/>
  <path class="arrow" d="M280 460 C330 460 345 314 405 314"/>
  <path class="arrow" d="M280 550 C330 550 345 314 405 314"/>
  <path class="arrow" d="M485 353 L485 380"/>
  <path class="arrow" d="M485 458 L485 485"/>
  <path class="arrow" d="M485 563 L485 595"/>
  <path class="arrow" d="M580 641 C620 641 620 314 670 314"/>
  <path class="arrow" d="M750 353 L750 380"/>
  <path class="arrow" d="M750 458 L750 485"/>
  <path class="arrow" d="M750 563 L750 595"/>
  <path class="arrow" d="M845 641 C885 641 885 314 935 314"/>
  <path class="arrow" d="M1015 353 L1015 380"/>
  <path class="arrow" d="M1015 458 L1015 485"/>
  <path class="arrow" d="M1015 577 L1015 610"/>

  <rect class="panel" x="1265" y="150" width="275" height="240"/>
  <text class="section-title" x="1295" y="190">React Console</text>
  <rect class="ui" x="1295" y="225" width="215" height="54"/>
  <text class="box-title" x="1347" y="258">Dashboard</text>
  <rect class="ui" x="1295" y="295" width="215" height="54"/>
  <text class="box-title" x="1335" y="328">Approval Queue</text>
  <rect class="ui" x="1295" y="365" width="215" height="54"/>
  <text class="box-title" x="1345" y="398">Digest Viewer</text>
  <path class="soft-arrow" d="M1295 322 C1245 322 1245 235 1160 235"/>

  <rect class="panel" x="1265" y="430" width="275" height="225"/>
  <text class="section-title" x="1295" y="470">AI Providers</text>
  <rect class="ai" x="1295" y="505" width="215" height="54"/>
  <text class="box-title" x="1354" y="538">OpenAI</text>
  <rect class="ai" x="1295" y="575" width="215" height="54"/>
  <text class="box-title" x="1334" y="608">Hugging Face</text>
  <path class="soft-arrow" d="M1295 532 C1190 532 1135 315 1095 315"/>
  <path class="soft-arrow" d="M1295 602 C1160 602 1110 523 830 523"/>

  <rect class="panel" x="60" y="750" width="465" height="165"/>
  <text class="section-title" x="90" y="790">Storage</text>
  <rect class="storage" x="90" y="825" width="125" height="56"/>
  <text class="box-title" x="124" y="858">Runs</text>
  <rect class="storage" x="230" y="825" width="125" height="56"/>
  <text class="box-title" x="254" y="858">Checkpoints</text>
  <rect class="storage" x="370" y="825" width="125" height="56"/>
  <text class="box-title" x="397" y="858">Digests</text>
  <path class="soft-arrow" d="M525 835 C625 805 650 725 750 687"/>

  <rect class="panel" x="585" y="785" width="285" height="130"/>
  <text class="section-title" x="615" y="825">Observability</text>
  <rect class="storage" x="615" y="850" width="225" height="42"/>
  <text class="box-title" x="668" y="877">LangSmith Traces</text>
  <path class="soft-arrow" d="M730 785 C735 745 745 710 750 687"/>

  <rect class="panel" x="930" y="750" width="610" height="165"/>
  <text class="section-title" x="960" y="790">Publishing Outputs</text>
  <rect class="output" x="960" y="825" width="155" height="56"/>
  <text class="box-title" x="984" y="858">Markdown File</text>
  <rect class="output" x="1135" y="825" width="155" height="56"/>
  <text class="box-title" x="1170" y="858">Email</text>
  <rect class="output" x="1310" y="825" width="155" height="56"/>
  <text class="box-title" x="1355" y="858">Slack</text>
  <path class="arrow" d="M1095 650 C1195 700 1220 760 1220 825"/>

  <text class="tiny" x="80" y="958">Design principle: spend AI tokens only after human approval, keep each agent replaceable, and persist every run for replay/debugging.</text>
</svg>
